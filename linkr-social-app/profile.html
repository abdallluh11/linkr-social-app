<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linkr — Profile</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- LOADER -->
    <div id="loader" style="visibility: hidden">
      <div class="lds-roller">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>

    <!-- MODALS -->
    <!-- LOGIN -->
    <div class="modal fade" id="login-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Login</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body px-4 py-3">
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input
                type="text"
                class="form-control"
                id="username-input"
                value="abdalluh"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input
                type="password"
                class="form-control"
                id="password-input"
                value="123456"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button class="sh-btn sh-btn-outline" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="sh-btn sh-btn-primary" onclick="LoginBtnClicked()">
              Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- REGISTER -->
    <div
      class="modal fade"
      id="register-modal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Create Account</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body px-4 py-3">
            <div class="mb-3">
              <label class="form-label fw-semibold">Profile Image</label>
              <input
                type="file"
                class="form-control"
                id="register-image-input"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="register-name-input"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input
                type="text"
                class="form-control"
                id="register-username-input"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input
                type="password"
                class="form-control"
                id="register-password-input"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button class="sh-btn sh-btn-outline" data-bs-dismiss="modal">
              Cancel
            </button>
            <button
              class="sh-btn sh-btn-primary"
              onclick="RegisterBtnClicked()"
            >
              Register
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- CREATE / EDIT POST -->
    <div
      class="modal fade"
      id="create-post-modal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="post-modal-title">
              Create Post
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body px-4 py-3">
            <input type="hidden" id="post-id-input" />
            <div class="mb-3">
              <label class="form-label fw-semibold">Title</label>
              <input
                type="text"
                class="form-control"
                id="post-title-input"
                placeholder="Post title…"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Body</label>
              <textarea
                id="post-body-input"
                class="form-control"
                rows="4"
                placeholder="What's on your mind?"
              ></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Image</label>
              <input type="file" class="form-control" id="post-image-input" />
            </div>
          </div>
          <div class="modal-footer">
            <button class="sh-btn sh-btn-outline" data-bs-dismiss="modal">
              Cancel
            </button>
            <button
              id="post-modal-submit-btn"
              class="sh-btn sh-btn-primary"
              onclick="CreateNewPostClicked()"
            >
              Create
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- DELETE POST -->
    <div
      class="modal fade"
      id="delete-post-modal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Delete Post?</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body px-4 py-3">
            <p class="mb-0" style="color: var(--text-muted)">
              This action cannot be undone.
            </p>
            <input type="hidden" id="delete-post-id-input" />
          </div>
          <div class="modal-footer">
            <button class="sh-btn sh-btn-outline" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="sh-btn sh-btn-danger" onclick="confirmPostDelete()">
              Yes, Delete
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- END MODALS -->

    <!-- ALERTS -->
    <div id="success-alert"></div>

    <!-- FAB -->
    <div id="add-btn" onclick="addBtnClicked()">+</div>

    <!-- NAVBAR -->
    <nav class="sh-nav">
      <div class="container">
        <a class="sh-nav-brand" href="home.html">Linkr</a>

        <ul class="sh-nav-links">
          <li><a href="home.html">Home</a></li>
          <li>
            <a onclick="profileClicked()" style="cursor: pointer" class="active"
              >Profile</a
            >
          </li>
        </ul>

        <div class="sh-nav-right" id="logged-in-div">
          <button
            class="sh-btn sh-btn-success-outline sh-btn-sm"
            data-bs-toggle="modal"
            data-bs-target="#login-modal"
          >
            Login
          </button>
          <button
            class="sh-btn sh-btn-outline sh-btn-sm"
            data-bs-toggle="modal"
            data-bs-target="#register-modal"
          >
            Register
          </button>
        </div>

        <div class="sh-nav-right" id="logout-div">
          <img id="nav-user-image" class="sh-nav-avatar" src="" alt="" />
          <span class="sh-nav-username" id="nav-username"></span>
          <button
            class="sh-btn sh-btn-danger-outline sh-btn-sm"
            onclick="logout()"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="sh-page" style="padding-top: 24px">
      <!-- PROFILE CARD -->
      <div class="sh-profile-card">
        <div class="sh-profile-inner">
          <img id="main-info-image" class="sh-profile-avatar" src="" alt="" />
          <div class="sh-profile-info">
            <p class="sh-profile-name" id="main-info-name">—</p>
            <p class="sh-profile-username" id="main-info-username">—</p>
            <p class="sh-profile-email" id="main-info-email">—</p>
          </div>
        </div>
        <div class="sh-profile-stats">
          <div class="sh-stat">
            <span class="sh-stat-number" id="posts-count">—</span>
            <span class="sh-stat-label">Posts</span>
          </div>
          <div class="sh-stat">
            <span class="sh-stat-number" id="comments-count">—</span>
            <span class="sh-stat-label">Comments</span>
          </div>
        </div>
      </div>

      <!-- POSTS SECTION -->
      <h2 class="sh-section-title"><span id="name-posts"></span>'s Posts</h2>

      <div id="user-posts">
        <!-- profileScripts.js fills this -->
      </div>
    </main>

    <script src="./mainLogic.js"></script>
    <script src="./profileScripts.js"></script>
  </body>
</html>
